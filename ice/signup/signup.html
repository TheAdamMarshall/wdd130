<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }

        #formContainer {
            background: white;
            width: 400px;
            height: 700px;
            margin: auto;
            border: 7px solid darkblue;
            border-radius: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 15px;
        }


        #imgTOP {
            grid-column: 1/3;
            text-align: center;
            background-image: url('images/jesus_feeds_5000.jpeg');
            background-size: cover;
            border-radius: 10px;
            color: white;
            text-shadow: 1px 1px 0px black;
            text-justify: center;
            min-height: 200px;
        }
        h2 {
            font-size: 1.5em;
        }
        h1 {
            margin: 120px 0 0 0;
            font-size: 2.5em;
        }
        h3 {
            grid-column: 1/3;
            text-align: center;
            color: black;
        }
        #myForm {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
            margin: auto;
            grid-column: 1/3;
            padding: 20px;
        }
        #un {
            grid-column: 1/2;
            grid-row: 1/2;
        }
        #pw {
            grid-column: 1/2;
            grid-row: 2/3;
        }
        #em {
            grid-column: 1/2;
            grid-row: 3/4;
        }
        #gd {
            grid-column: 1/2;
            grid-row: 4/5;
        }
        #newsletter {
            grid-column: 1/3;
            grid-row: 5/6;
            justify-items: center;
        }
        #conditions {
            grid-column: 1/3;
            grid-row: 6/7;
            justify-items: center;
        }
        #submit {
            grid-column: 1/3;
            grid-row: 7/8;
            justify-items: center;
        }

        #username {
            grid-column: 2/3;
            grid-row: 1/2;
            justify-self: right;
        }
        #password {
            grid-column: 2/3;
            grid-row: 2/3;
            justify-self: right;
        }
        #email {
            grid-column: 2/3;
            grid-row: 3/4;
            justify-self: right;
        }
        #gender {
            grid-column: 2/3;
            grid-row: 4/5;
            justify-self: right;

        }
        #closeBtn {
            position:absolute;
            top: 10px;
            left: 170px;
            cursor: pointer;
        }

    </style>




</head>

<body>
    <div id="formContainer">
        <div id="imgTOP">
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </div>
        <h3>Sign Up for Daily Scripture Feed</h3>
        <form id="myForm">
            <button type="button" id="closeBtn">X</button>
            <label for="username" id="un">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password" id="pw">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email" id="em">Email:</label>
            <input type="email" id="email" name="email" required>

            <label id="gd">Gender:</label>
            <div id="gender">
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div><br>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section><br>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section><br>

            <section>
                <button type="submit">Submit</button>
            </section>
        </form>











        <div></div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
