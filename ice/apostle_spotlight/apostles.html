<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        body {
            background-color: #e8eced;
        }
        div {
            display: center;
            flex-wrap: wrap;
            justify-content: center;
            border: 5px solid black;
            size: 1300px 700px;
            margin: 50px 150px 100px 150px;
            background-image: url('images/christus.webp');
            background-position-x: -350px;
            text-align: center;
            border-radius: 5%;
        }
        img {
            
            margin: 10px;
            border-radius: 50%;
            border: 7px solid white;

        }
        #apostle-image {
            width: 70px;
            height: 70px;
        }
        #fp-image {
            width: 100px;
            height: 100px;
        }
        #prophet-image {
            width: 120px;
            height: 120px;
        }
        h1 {
            font-size: 50px;
            color: white;
            text-shadow: black 10px 0 10px;
        }
        h2 {
            font-size: 25px;
            color: white;
            text-shadow: black 10px 0 10px;
        }
    </style>
</head>
<body>
    <div>
        <h1>First Presidency</h1>
        <img src="images/eyring.webp" alt="Eyring" class="fp-image" id="fp-image">
        <img src="images/oaks.webp" alt="Oaks" class="prophet-image" id="prophet-image">
        <img src="images/christofferson.webp" alt="Christofferson" class="fp-image" id="fp-image">
        <h2>Quorum of the Twelve Apostles</h2>
        <img src="images/holland.webp" alt="Holland" class="apostle-image" id="apostle-image">
        <img src="images/uchtdorf.webp" alt="Uchtdorf" class="apostle-image" id="apostle-image">
        <img src="images/bednar.webp" alt="Bednar" class="apostle-image" id="apostle-image">
        <img src="images/cook.webp" alt="Cook" class="apostle-image" id="apostle-image">
        <br></br>
        <img src="images/anderson.webp" alt="Anderson" class="apostle-image" id="apostle-image">
        <img src="images/rasband.webp" alt="Rasband" class="apostle-image" id="apostle-image">
        <img src="images/stevenson.webp" alt="Stevenson" class="apostle-image" id="apostle-image">
        <img src="images/renlund.webp" alt="Renlund" class="apostle-image" id="apostle-image">
        <br></br>
        <img src="images/gong.webp" alt="Gong" class="apostle-image" id="apostle-image">
        <img src="images/soares.webp" alt="Soares" class="apostle-image" id="apostle-image">
        <img src="images/kearon.webp" alt="Kearon" class="apostle-image" id="apostle-image">
        <img src="images/causse.webp" alt="Causse" class="apostle-image" id="apostle-image">
    </div>
</body>
</html>
